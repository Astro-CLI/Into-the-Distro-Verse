# Catppuccin Frappe Theme - generated via: kitty +kitten themes --dump-theme Catppuccin-Frappe
# Include this theme or use: kitty +kitten themes --dump-theme Catppuccin-Frappe > ~/.config/kitty/catppuccin-frappe.conf
# Then uncomment the line below:
# include ~/.config/kitty/catppuccin-frappe.conf

# For now, the theme will be loaded from Kitty's built-in themes.
# You can also set it interactively: kitty +kitten themes

# Font
font_family      JetBrains Mono Nerd Font
font_size        11

# Cursor (Kitty-specific: keeps cursor trail which Ghostty doesn't have)
cursor_shape     beam
cursor_trail     1

# Use Fish shell
shell            /usr/bin/fish

# Confirm on close (matching Ghostty default)
confirm_os_window_close 0

# ===== KEYBINDINGS (Unified with Ghostty) =====

# Font zoom (matching Ghostty defaults)
map ctrl+plus     change_font_size all +1
map ctrl+equal    change_font_size all +1
map ctrl+minus    change_font_size all -1
map ctrl+0        change_font_size all 0

# Split terminal like Ghostty
map ctrl+shift+e  launch --location=vsplit --cwd=current
map ctrl+shift+o  launch --location=hsplit --cwd=current

# Tab management (Ghostty-like)
map ctrl+shift+t  new_tab_with_cwd
map ctrl+shift+w  close_tab
map ctrl+shift+n  new_os_window
map ctrl+page_up  previous_tab
map ctrl+page_down next_tab
map ctrl+shift+tab previous_tab
map ctrl+tab      next_tab

# Window/app management
map ctrl+shift+q  quit
map alt+f4        quit

# Copy/Paste (Ghostty style)
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map shift+insert  paste_from_selection

# Search (Ghostty-like)
map ctrl+shift+f  launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Select all text
map ctrl+shift+a  select_all

# Fullscreen toggle
map ctrl+enter    toggle_fullscreen

# Split navigation (move between splits with arrow keys)
map ctrl+alt+up    neighboring_window up
map ctrl+alt+down  neighboring_window down
map ctrl+alt+left  neighboring_window left
map ctrl+alt+right neighboring_window right

# Close split
map ctrl+shift+d  close_window

# Zoom split focus
map ctrl+shift+z  toggle_maximized

# Reload config
map ctrl+shift+comma reload_config
